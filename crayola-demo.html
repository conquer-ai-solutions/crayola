<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crayola — Innovation-to-Market AI · Indicative Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg: #F5F5F7;
  --card: #FFFFFF;
  --border: rgba(0,0,0,0.07);
  --border-light: rgba(0,0,0,0.04);
  --text: #1D1D1F;
  --text-secondary: #424245;
  --text-dim: #6E6E73;
  --text-muted: #86868B;
  --brand: #1EB253;
  --brand-dark: #178C42;
  --brand-light: rgba(30,178,83,0.08);
  --brand-mid: rgba(30,178,83,0.15);
  --green: #10B981;
  --green-bg: rgba(16,185,129,0.08);
  --amber: #F59E0B;
  --amber-bg: rgba(245,158,11,0.08);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.08);
  --blue: #3B82F6;
  --blue-bg: rgba(59,130,246,0.08);
  --purple: #8B5CF6;
  --purple-bg: rgba(139,92,246,0.08);
  --orange: #F97316;
  --orange-bg: rgba(249,115,22,0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -4px rgba(0,0,0,0.04);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --font: 'Inter', -apple-system, sans-serif;
}
html{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{min-height:100vh}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:20px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;letter-spacing:-0.5px}
.logo-icon{width:32px;height:32px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:800}
.logo span{color:var(--brand)}
.nav-tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--radius-sm);padding:3px}
.nav-tab{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text-dim);cursor:pointer;transition:all 0.15s;border:none;background:none;font-family:var(--font)}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{background:var(--card);color:var(--text);font-weight:600;box-shadow:var(--shadow-sm)}
.header-right{display:flex;align-items:center;gap:14px}
.badge{background:var(--brand);color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:0.3px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand-dark));display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh}
.main{flex:1;overflow-y:auto;padding:24px 28px}

/* COVER / OVERVIEW */
.cover{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;margin-bottom:40px}
.cover-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--brand);margin-bottom:16px}
.cover-title{font-size:44px;font-weight:800;letter-spacing:-1.5px;line-height:1.08;margin-bottom:16px}
.cover-title span{color:var(--brand)}
.cover-sub{font-size:16px;color:var(--text-dim);line-height:1.65;margin-bottom:32px}
.cover-stats{display:flex;gap:32px}
.stat-val{font-size:30px;font-weight:800;letter-spacing:-1px;color:var(--brand)}
.stat-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px;font-weight:500}
.cover-visual{width:100%;aspect-ratio:1.3;background:linear-gradient(135deg,#ECFDF5,#F0FDF4,#ECFDF5);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
.cover-features{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cover-feature{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all 0.2s}
.cover-feature:hover{border-color:var(--brand);box-shadow:var(--shadow-md)}
.cf-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.cf-title{font-size:13px;font-weight:700;margin-bottom:4px}
.cf-desc{font-size:12px;color:var(--text-dim);line-height:1.5}

/* FLOW DIAGRAM */
.flow-section{margin-bottom:40px}
.flow-title{font-size:20px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.flow-sub{font-size:13px;color:var(--text-dim);margin-bottom:24px}
.flow-track{display:flex;align-items:center;gap:0;overflow-x:auto;padding:8px 0}
.flow-node{flex-shrink:0;background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:16px 20px;min-width:160px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.flow-node:hover,.flow-node.active{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-light)}
.flow-node.active{background:var(--brand-light)}
.flow-node .fn-icon{font-size:22px;margin-bottom:6px}
.flow-node .fn-label{font-size:12px;font-weight:700;letter-spacing:-0.2px}
.flow-node .fn-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.flow-arrow{flex-shrink:0;width:32px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px}
.flow-node.done{border-color:var(--green)}
.flow-node.done::after{content:'✓';position:absolute;top:-8px;right:-8px;width:20px;height:20px;background:var(--green);color:white;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all 0.2s;cursor:pointer}
.card:hover{border-color:var(--brand);box-shadow:var(--shadow-md)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.card-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:0.3px}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px;letter-spacing:-0.2px}
.card-desc{font-size:12px;color:var(--text-dim);line-height:1.55}
.card-meta{display:flex;gap:16px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border-light)}
.card-meta span{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}

/* DETAIL PANEL */
.detail-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:32px}
.dp-header{padding:24px;border-bottom:1px solid var(--border)}
.dp-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--brand);margin-bottom:8px}
.dp-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
.dp-subtitle{font-size:13px;color:var(--text-dim)}
.dp-body{padding:24px}
.dp-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px}
.dp-tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.dp-tab:hover{color:var(--text)}
.dp-tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);background:#FAFAFA}
.data-table td{padding:12px 14px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#FAFAFA}
.field-name{font-weight:600;color:var(--text)}
.field-val{color:var(--text-secondary);font-family:'Courier New',monospace;font-size:12px}
.confidence{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600}
.conf-high{color:var(--green)}
.conf-med{color:var(--amber)}
.conf-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* PIPELINE */
.pipeline-cols{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.pipe-col{background:var(--bg);border-radius:var(--radius);padding:12px}
.pipe-col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.pipe-col-title{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-dim)}
.pipe-count{font-size:10px;font-weight:700;background:var(--brand-light);color:var(--brand);padding:2px 6px;border-radius:4px}
.pipe-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.pipe-card:hover{border-color:var(--brand);box-shadow:var(--shadow-sm)}
.pipe-card-title{font-size:12px;font-weight:600;margin-bottom:4px}
.pipe-card-meta{font-size:10px;color:var(--text-muted)}
.pipe-card-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:6px;letter-spacing:0.3px}

/* ASK AI PANEL */
.ai-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;height:calc(100vh - 104px)}
.ai-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.ai-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));display:flex;align-items:center;justify-content:center;color:white;font-size:16px}
.ai-header-text h3{font-size:15px;font-weight:700;letter-spacing:-0.3px}
.ai-header-text p{font-size:11px;color:var(--text-muted)}
.ai-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.ai-msg{max-width:80%;padding:12px 16px;border-radius:var(--radius);font-size:13px;line-height:1.6}
.ai-msg.bot{background:var(--bg);align-self:flex-start;border-bottom-left-radius:4px}
.ai-msg.user{background:var(--brand);color:white;align-self:flex-end;border-bottom-right-radius:4px}
.ai-msg h4{font-size:13px;font-weight:700;margin-bottom:6px}
.ai-msg ul{margin:6px 0;padding-left:18px}
.ai-msg li{margin-bottom:4px;font-size:12px}
.ai-chips{display:flex;flex-wrap:wrap;gap:8px;padding:12px 24px;border-top:1px solid var(--border-light)}
.chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text-secondary);cursor:pointer;background:white;font-family:var(--font);transition:all 0.15s}
.chip:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-light)}
.ai-input-row{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0;background:white}
.ai-input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);color:var(--text);outline:none;transition:border-color 0.15s}
.ai-input:focus{border-color:var(--brand)}
.send-btn{padding:10px 20px;background:var(--brand);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background 0.15s}
.send-btn:hover{background:var(--brand-dark)}

/* INBOX */
.inbox-layout{display:grid;grid-template-columns:380px 1fr;gap:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;height:calc(100vh - 104px)}
.inbox-list{border-right:1px solid var(--border);overflow-y:auto}
.inbox-list-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.inbox-item{padding:14px 20px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background 0.1s}
.inbox-item:hover{background:var(--bg)}
.inbox-item.active{background:var(--brand-light);border-left:3px solid var(--brand)}
.inbox-item-title{font-size:13px;font-weight:600;margin-bottom:2px}
.inbox-item-sub{font-size:11px;color:var(--text-muted)}
.inbox-item-meta{display:flex;justify-content:space-between;margin-top:6px}
.inbox-item-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:0.3px}
.inbox-item-time{font-size:10px;color:var(--text-muted)}
.inbox-detail{overflow-y:auto;padding:0}
.inbox-detail-header{padding:24px;border-bottom:1px solid var(--border)}
.inbox-detail-body{padding:24px}

/* SECTION HEADERS */
.section-header{margin-bottom:20px}
.section-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--brand);margin-bottom:6px}
.section-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.section-subtitle{font-size:13px;color:var(--text-dim);margin-top:4px}

/* STAT STRIP */
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;text-align:center}
.stat-card .sc-val{font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--brand)}
.stat-card .sc-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;font-weight:500}

/* WARN BOX */
.warn-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--radius);padding:16px 20px;font-size:12px;color:#92400E;line-height:1.6;margin:20px 0}
.warn-box strong{font-weight:700}

/* BEFORE/AFTER */
.ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:32px}
.ba-col{padding:28px}
.ba-col.before{background:#FFF5F5}
.ba-col.after{background:#ECFDF5}
.ba-col h3{font-size:15px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ba-col ul{list-style:none;padding:0}
.ba-col li{padding:8px 0;font-size:13px;color:var(--text-secondary);display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.ba-col li::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}
.ba-col.before li::before{background:var(--red)}
.ba-col.after li::before{background:var(--green)}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease-out}

/* RESPONSIVE */
@media(max-width:900px){
  .cover{grid-template-columns:1fr}
  .cover-visual{display:none}
  .pipeline-cols{grid-template-columns:1fr 1fr}
  .inbox-layout{grid-template-columns:1fr}
  .stat-strip{grid-template-columns:repeat(2,1fr)}
  .ba-grid{grid-template-columns:1fr}
}
</style>
</head>

<div id="root"></div>
<script>
(function(){
  // ── MINI REACT ──
  let _state={}, _id=0, _root, _app;
  function useState(init){
    const id=_id++;
    if(!(id in _state)) _state[id]=init;
    const setS=v=>{_state[id]=typeof v==='function'?v(_state[id]):v;_id=0;render()};
    return[_state[id],setS];
  }
  function h(tag,props,...ch){
    if(typeof tag==='function') return tag(props||{});
    const el=document.createElement(tag);
    if(props) Object.entries(props).forEach(([k,v])=>{
      if(k==='className') el.className=v;
      else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
      else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
      else if(k==='innerHTML') el.innerHTML=v;
      else el.setAttribute(k,v);
    });
    ch.flat(Infinity).forEach(c=>{
      if(c==null||c===false) return;
      el.appendChild(typeof c==='object'?c:document.createTextNode(String(c)));
    });
    return el;
  }
  function render(){_id=0;const r=_app();_root.innerHTML='';_root.appendChild(r)}

  // ── DATA ──
  const insights = [
    {id:1, title:'Consumer AI Sentiment \u2014 Parents 3-12', category:'Research', status:'New', time:'2h ago', priority:'high',
     summary:'AI-moderated study of 108 parents shows Crayola is preferred 4x over tech giants for kid-facing AI. Trust advantage is significant \u2014 parents value safety, nostalgia, and child-first values.',
     fields:[

       {name:'Trust Preference',val:'4x over tech competitors',conf:'high'},
       {name:'Top Concern',val:'AI replacing creativity, not sparking it',conf:'high'},
       {name:'Key Insight',val:'Parents value the process, not the product',conf:'high'},
       {name:'Age Sensitivity',val:'6-8 most sensitive to "AI replacing creativity"',conf:'med'},
       {name:'Source',val:'Suzy Speaks + Listen Labs AI Moderated Research',conf:'high'}

     summary:'AI-generated packaging variants for Ultra-Clean Washable Markers across 3 brand lines. 12 variants produced in 4 minutes vs. typical 3-week agency cycle. Awaiting brand team approval.',
     fields:[
       {name:'Product Line',val:'Ultra-Clean Washable Markers, 10ct',conf:'high'},
       {name:'Variants Generated',val:'12 packaging concepts',conf:'high'},
       {name:'Time to Generate',val:'4 minutes',conf:'high'},
       {name:'Traditional Timeline',val:'3 weeks (agency)',conf:'med'},
       {name:'Brand Compliance',val:'92% match to guidelines',conf:'high'},
       {name:'Cost Reduction',val:'~60% per packaging cycle',conf:'med'}
     ]},
    {id:3, title:'Patent Landscape \u2014 Ultra-Clean Paint Innovation', category:'R&D', status:'Flagged', time:'1d ago', priority:'high',
     summary:'Eureka patent intelligence scan identified 3 adjacent patents in washable marker technology. One overlaps with Ultra-Clean Paint Innovation. Early awareness enables proactive IP strategy.',
     fields:[
       {name:'Platform',val:'Eureka by Patsnap \u2014 Cloud Patent Intelligence',conf:'high'},
       {name:'Adjacent Patents Found',val:'3 (1 high relevance)',conf:'high'},
       {name:'Overlap Area',val:'Washable pigment micro-encapsulation',conf:'med'},
       {name:'Risk Level',val:'Medium \u2014 pre-filing stage',conf:'med'},
       {name:'Recommendation',val:'File provisional patent within 90 days',conf:'high'},
       {name:'Competitive Intel',val:'2 competitors expanding in segment',conf:'med'}
     ]},
    {id:4, title:'GEO Optimization \u2014 Crayola on ChatGPT & Gemini', category:'Search', status:'New', time:'3h ago', priority:'med',
     summary:'Generative Experience Optimization audit shows Crayola appears in 34% of relevant AI-generated answers for creative kids activities. Opportunity to increase to 70%+ with structured content strategy.',
     fields:[
       {name:'Current AI Visibility',val:'34% of relevant queries',conf:'high'},
       {name:'Target Visibility',val:'70%+ within 6 months',conf:'med'},
       {name:'Platforms Audited',val:'ChatGPT, Gemini, Perplexity',conf:'high'},
       {name:'Top Gap',val:'Age-specific craft recommendations',conf:'high'},
       {name:'Content Needed',val:'250+ structured activity guides',conf:'med'},
       {name:'Estimated Traffic Impact',val:'+180% organic AI referrals',conf:'med'}
     ]}
  ];

  const pipelineData = {
    'Discovery':[
      {title:'Creativity Companion Robot',tag:'Platform X',tagColor:'var(--purple)',tagBg:'var(--purple-bg)',meta:'Stage 1 \u2014 Explore'},
      {title:'AI Drawing Coach',tag:'Consumer',tagColor:'var(--blue)',tagBg:'var(--blue-bg)',meta:'Age 6-8 focus'}
    ],
    'Ideation':[
      {title:'Color Spell Magic Alchemy Kit',tag:'NPD',tagColor:'var(--brand)',tagBg:'var(--brand-light)',meta:'Product Development'},
      {title:'Personalized Coloring Books',tag:'GenAI',tagColor:'var(--orange)',tagBg:'var(--orange-bg)',meta:'On-demand printing'}
    ],
    'Validation':[
      {title:'Smart Label \u2014 Interactive Packaging',tag:'R&D',tagColor:'var(--amber)',tagBg:'var(--amber-bg)',meta:'Prototype Q3'},
      {title:'Retailer AI Data Partnership',tag:'Partnership',tagColor:'var(--purple)',tagBg:'var(--purple-bg)',meta:'Amazon Rufus / Walmart Sparky'}
    ],
    'Build':[
      {title:'Automated Merch Design Engine',tag:'Efficiency',tagColor:'var(--green)',tagBg:'var(--green-bg)',meta:'10% SG&A target'},
      {title:'Product Content Generator',tag:'GenAI',tagColor:'var(--orange)',tagBg:'var(--orange-bg)',meta:'Copy + imagery pipeline'}
    ],
    'Launch':[
      {title:'Human Knowledge Studio',tag:'Live',tagColor:'var(--green)',tagBg:'var(--green-bg)',meta:'Deployed \u2014 Strategic Planning'},
      {title:'Suzy Speaks AI Research',tag:'Live',tagColor:'var(--green)',tagBg:'var(--green-bg)',meta:'5x faster, 40% cheaper'}
    ]

  function AskAI(){
    var _m = useState([{role:'bot',html:'<h4>\uD83D\uDC4B Welcome to Crayola Innovation AI</h4><p>I have access to your innovation pipeline, consumer research, R&D data, and market intelligence. How can I help?</p>'}]);
    var messages = _m[0], setMessages = _m[1];
    var _i = useState('');
    var input = _i[0], setInput = _i[1];
    var chips = Object.keys(aiResponses);

    function send(text){
      if(!text||!text.trim()) return;
      var userMsg = {role:'user',html:text};
      var botResp = {role:'bot',html: aiResponses[text] || '<h4>Processing</h4><p>I\'m analyzing your question across the innovation pipeline, consumer research database, and R&D intelligence. In a live system, this would query connected data sources in real time and return a synthesized answer within seconds.</p><p>Try one of the suggested questions to see a full demonstration.</p>'};
      setMessages(function(m){return m.concat([userMsg, botResp])});
      setInput('');
    }

    return h('div',{className:'main fade-in'},
      h('div',{className:'ai-panel'},
        h('div',{className:'ai-header'},
          h('div',{className:'ai-icon'},'\u2726'),
          h('div',{className:'ai-header-text'},

          chips.map(function(c){return h('button',{className:'chip',onClick:function(){send(c)}},c)})
